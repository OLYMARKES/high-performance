<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>High Performance - Participant Stories</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b1010;
      --surface: #131a19;
      --surface-alt: #0f1514;
      --surface-soft: #171f1e;
      --border: #293231;
      --text: #ecf1ef;
      --muted: #99a59f;
      --soft: #74817c;
      --accent: #d4a25f;
      --accent-2: #92c5a4;
      --danger: #d1867b;
      --radius: 22px;
    }
    body {
      min-height: 100vh;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(212, 162, 95, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(146, 197, 164, 0.09), transparent 24%),
        linear-gradient(180deg, #0a0f0f 0%, #0f1514 100%);
      padding: 28px 16px 56px;
    }
    .page { max-width: 1480px; margin: 0 auto; }
    .hero {
      padding: 26px 0 30px;
      text-align: center;
    }
    .hero-label {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.32em;
      font-size: 11px;
      font-weight: 700;
    }
    h1 {
      margin-top: 20px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 8vw, 78px);
      line-height: 0.96;
      font-weight: 400;
    }
    h1 em { color: var(--accent); font-style: italic; }
    .hero-sub {
      max-width: 980px;
      margin: 18px auto 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
      font-weight: 300;
    }
    .panel {
      background: rgba(19, 26, 25, 0.88);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) auto;
      gap: 14px;
      align-items: center;
    }
    .input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-alt);
      color: var(--text);
      font: inherit;
      padding: 15px 18px;
      outline: none;
    }
    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212, 162, 95, 0.14);
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }
    .chip {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .chip.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #111;
      font-weight: 700;
    }
    .stats {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }
    .stat {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }
    .stat-label {
      color: var(--soft);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 11px;
      font-weight: 600;
    }
    .stat-value {
      margin-top: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      line-height: 1;
    }
    .stories {
      margin-top: 20px;
      display: grid;
      gap: 18px;
    }
    .story-card {
      background: rgba(19, 26, 25, 0.95);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.14);
    }
    .story-card.is-missing {
      border-color: rgba(209, 134, 123, 0.45);
    }
    .story-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
    }
    .story-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 4vw, 42px);
      line-height: 1;
      font-weight: 400;
    }
    .story-meta {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      background: var(--surface-alt);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }
    .pill.is-ok {
      color: #102014;
      background: var(--accent-2);
      border-color: var(--accent-2);
      font-weight: 700;
    }
    .pill.is-missing {
      color: #2b100c;
      background: #e5a196;
      border-color: #e5a196;
      font-weight: 700;
    }
    .story-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      max-width: 420px;
    }
    .story-link {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 11px 14px;
      background: var(--surface-alt);
      font-size: 13px;
      transition: all 0.2s ease;
    }
    .story-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .story-grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
      gap: 18px;
    }
    .story-main, .story-side {
      display: grid;
      gap: 14px;
    }
    .block {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
    }
    .block-label {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      font-weight: 700;
    }
    .block-text {
      margin-top: 12px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.82;
      white-space: pre-wrap;
    }
    .facts {
      display: grid;
      gap: 10px;
    }
    .fact {
      display: grid;
      gap: 4px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .fact:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .fact-label {
      color: var(--soft);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
    .fact-value {
      color: var(--text);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    details {
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      overflow: hidden;
    }
    summary {
      list-style: none;
      cursor: pointer;
      padding: 16px 18px;
      color: var(--text);
      font-weight: 600;
    }
    summary::-webkit-details-marker { display: none; }
    details[open] summary {
      border-bottom: 1px solid var(--border);
    }
    .details-body {
      padding: 16px 18px 18px;
      white-space: pre-wrap;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }
    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 20px;
      background: var(--surface-alt);
    }
    @media (max-width: 1100px) {
      .toolbar { grid-template-columns: 1fr; }
      .filter-bar { justify-content: flex-start; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .story-grid { grid-template-columns: 1fr; }
      .story-head { flex-direction: column; }
      .story-links { justify-content: flex-start; max-width: none; }
    }
    @media (max-width: 640px) {
      body { padding: 18px 12px 36px; }
      .panel, .story-card { padding: 18px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>

ithub.io/high-performance/week_1_trackers_april_2026/w1_p3t8m6k1z9w4.html?v=materials-pdf-v13", "hasQuestionnaire": true, "matchedBy": "slug", "submittedAt": "2026-03-26T13:40:37.050Z", "submittedAtLabel": "26.03.2026 13:40 UTC", "email": "victoria.pasko@gmail.com", "selectedPath": "personal", "courseChoice": "", "responseData": {"visionFuture": "У меня много энергии и я чувствую себя заряжено весь день. Я не залипаю на работу, не проваливаюсь в задачи, а помню про себя и своё тело в течение дня, двигаюсь. Я нахожу время для важных ритуалов каждый день - дыхание, медитации; спорт вписан в мою рутину и я двигаюсь регулярно, а не когда вспомню об этом.\nЯ пробую фокусно приоритизировать задачи по важности и удовольствию, меньше сабботирую (или лучше понимаю, почему «сливаюсь»), провожу своё время качественно.\n\nУ меня высокая мотивация наладить эти процессы, поэтому есть запал вникнуть в это насколько возможно!", "participantEmail": "victoria.pasko@gmail.com", "courseChoice": "", "selectedPath": "personal", "personalContext": "Я довольно чувствительна к нагрузкам, моя нервная система не выдерживает высокоинтенсивных или тяжелых силовых тренировок. Тело и мышцы могут и в моменте ок, но после таких тренировок часто бывают аллергические реакции и серьезный упадок сил. Поэтому 1,5 года назад я отказалась от персональной работы с тренером и перешла на мобильность, биомеханику, пилатес. Лучше всего мне подходят короткие тренировки (до 30 мин) с неинтесивной нагрузкой. Пульс повышаю очень постепенно и мягко.\n\nВторой важный момент - у меня есть нюансы с кишечником, периодически после стрессов или сильных вирусов серьезно нарушается его работа, что сказывается сильно на физ. состоянии - есть аллергические симптомы (гистаминоз), меньше сил, меньше концентрации, больше тревоги. Сейчас я как раз нахожусь в фазе восстановления после вируса, поэтому у меня меньше сил, чем обычно. На это время я исключаю глютен, алкоголь, мучные изделия, сильно уменьшаю сахар (включая фрукты). Знаю, что делать, тк не впервые прохожу это, но каждый раз сильно раздражаюсь, что нет сил и нужны ограничения.\nПо питанию: кроме временных ограничений выше, ем всё, больший упор делаю на белки, жиры и овощи, питаюсь довольно чисто. Из-за особенностей с кишечником также обязательно слежу за клетчаткой. Не могу без кофе и сыра 😅 Ем обычно 3 р в день, перекусываю редко.\n\nСплю хорошо и достаточно (это priority), но sleep consistency хромает.\nРежим у меня не постоянный, сложно вписать в день регулярно практики, которые бы я хотела, особенно, когда работаю из офиса, поэтому медитации, дыхание и спорт делаю ad-hoc. У меня большой скоуп на работе, который я сейчас пытаюсь сократить, и, бывает, пропадаю в звонках и задачах, забываю о движении.\n\nЧасто бывают отеки, особенно в области таза, как реакция на стресс, но в последнее время и в общем.", "vip": {"healthRestrictions": "Только то, что описала выше. Чувствительный кишечник, как следствие периодические аллергические реакции в периоды обострения, упадок сил. Сложности с высоко-интенсивной нагрузкой, высоким пульсом и тяжелыми силовыми тренировками.", "typicalDay": "Просыпаюсь обычно между 7:30 и 8:30, на выходных могу попозже. Засыпаю 23:00-00:00. Перед сном часто смотрим с мужем что-то на лэптопе.\nЯ не morning person, утром не люблю активничать и много общаться, идеально если пару часов могу медленно входить в день.\nСпорт обычно в середине дня или ранним вечером.\nРесурс сильно забирает много общения / взаимодействия с людьми, переключение между задачами — этого много на работе сейчас. Чувствую себя сильно уставшей, если день полный звонков.", "childrenDetail": "", "pregnantDetail": "", "pelvicFloorFlags": ["Ничего из перечисленного"], "curatorMessage": "У меня есть тенденция пытаться ускорять результат, мне сложно ждать, если плохо себя чувствую, бывает, пытаюсь пробовать слишком много всего, чтобы решить проблему, вместо того, чтобы выбрать 2-3 инструмента, которые работают, и в своем темпе двигаться к изменениям рю. Примерно каждый час.\nНакрывает напряжение утром, так как трудно вставать. Потом бодрая через час примерно. А потом уже вечером около 18 часов чувствую усталость. Между консультациями с клиентом как раз хочется сладкого и курить, чтобы снять напряжение. Около 20 часов теряюсь, что делать. Уже устала, но важно навести порядок на кухне, помочь детям с ДЗ, немного навести порядок дома. А если всё это не делать, то тогда не знаю, чем заняться. Включить посмотреть интервью, позалипать в соцсетях - снова экранное время, за которое себя ругаю, так как и так его много по работе и учебе.\nСтрессую на учебе, учусь в магистратуре на 1м курсе, очень высокая нагрузка.\nЖрет ресурс ощущение, что я мало успеваю. Переживаю, что не хватит денег на всё, что важно. Так как я сама обеспечиваю семью и не могу расслабиться. Сравниваю себя с другими часто. Работаю над этим, но всё еще проваливаюсь, когда устаю.\nВ периоды свободного времени (в выходные, иногда в будни появляется окно 2-3 часа) я просто лежу и смотрю реалити всякие, так отдыхаю. На активности и новые проекты сил нет.", "healthSummary": "По здоровью и ограничениям отмечает:\nЕсть сколиоз и кифоз с детства.\n\nДиастаз: нет диастаза.\n\nПо тазовому дну отмечены пункты: Попадание воздуха во влагалище во время секса, Частое мочеиспускание или недержание при нагрузке, смехе, кашле.", "foodSummary": "По отношению к питанию видны риски/триггеры: Бывают эпизоды переедания.\n\nПищевой паттерн сейчас выглядит так:\nЗавтрак обычно: яйца жареные, бутерброд с маслом/сыром/с красной рыбой. Иногда гречка с мясом. Плюс что-то сладкое.\nОбед: борщ, гарнир и мясо/курица, что-то из закусок типа баклажанов, иногда салат. Сладкое.\nУжин: гарнир и мясо. Сладкое.\nВ обед пью одну чашку кофе.\nВоду пью около 1,5 литров примерно.\nНа гарнир часто: гречка, макароны, рис, тушеные овощи, иногда чечевица.\nМясо: говядина, курица, индейка.\nЕжедневно шоколад, конфеты, печенье, пироженки. Что-то из этого.\n\nХочу уменьшить тесто в любом виде. Вообще рагмы.", "purpose": "Тело\nБизнес\n\nПоявится энергия или напротив, просто буду верить и делать.\n\nВообще не понятно.", "health": "Вроде выше описала.\nИнфаркт 2024 май. Но я уже устойчива и нагружаю себя. Но и чувствую, когда достаточно и останавливаюсь. Пока еще не иду фанатично в нагрузку.\nКесарево, живот домиком. Мышцы не восстановлены.", "typicalDay": "Так, все очень по разному. Я много перемещаюсь, много нахожусь в море.\nДень на берегу:\n7.30 просыпаюсь\n10 минут на фейс массаж\nДалле иду или бегу на море, могу искупаться или нет по состоянию здоровья.\nКормлю всех завтраком.\nПриходит няня к Василисе, я ухожу работать в комнату или на яхту.\nКаждый день велосипер 20 мин до марины или центра и 20 мин обратно.\nИ в течение дня или треня в парке минут на 20-30 или просто танцы в наушниках или пилатес на трансформерах. 3 раза в неделю стараюсь что то делать.\n\nС 17.00 гуляю с Василисой, потом всех кормлю ужином , делаю уроки с сыном и укладываю всех спать. В 22.30 все спят и я.\nКогда не справляюсь с тревогой могу просыпаться в 3 ночи. У Василисы боли роста и она может в это время просыпаться и мне нужно ей сделать массаж, если не поможет дать нурафен\n\nБывает из за тревоги не могу заснуть.\n\nВ общем. Вся тревога связана с финансами. Они не стабильны и расходы не предсказуемы. И у меня нет второго взрослого, кто мог бы здесь быть опорой Здесь зона роста, в смысле перестать уже тревожится на эту тему, потому что я всегда выруливаю.", "foodHabits": "Выше уже описывла.\nПродолжаю.\n3 , редко 4 приема. Не ограничиваю, если хочу еще положить тарелку гречки, кладу.\nВоды сейчас не допиваю, потеряла свой термос. Без термоса, около 1 л.", "medications": "Хочется научиться кушать с наслаждением и удовольствием, без вины, критики.", "curatorMessage": "Хочется научиться кушать с наслаждением и удовольствием, без вины, критики.", "nutritionFlags": "Бывают эпизоды переедания, Регулярно чувствую вину после еды", "pelvicFlags": "Частое мочеиспускание или недержание при на     const storiesRoot = document.getElementById('stories');
    const searchInput = document.getElementById('search');
    const filters = document.getElementById('filters');
    const statTotal = document.getElementById('stat-total');
    const statSaved = document.getElementById('stat-saved');
    const statMissing = document.getElementById('stat-missing');
    const statPick = document.getElementById('stat-pick');
    let activeFilter = 'all';

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function paragraph(text) {
      if (!String(text || '').trim()) {
        return '<div class="fact-value">—</div>';
      }
      return `<div class="block-text">${escapeHtml(text)}</div>`;
    }

    function detailSection(title, text) {
      if (!String(text || '').trim()) {
        return '';
      }
      return `
        <details>
          <summary>${escapeHtml(title)}</summary>
          <div class="details-body">${escapeHtml(text)}</div>
        </details>
      `;
    }

    function buildCard(row) {
      const story = row.story || {};
      const hasCourse = Boolean(row.courseChoice);
      const needsPick = row.hasQuestionnaire && !hasCourse && row.selectedPath === 'personal';
      const statusPill = row.hasQuestionnaire
        ? `<span class="pill is-ok">Анкета сохранена</span>`
        : `<span class="pill is-missing">Нет серверной анкеты</span>`;
      const pickPill = needsPick
        ? `<span class="pill">Нужно подобрать курс</span>`
        : hasCourse
          ? `<span class="pill">${escapeHtml(row.courseChoice ? 'Курс: ' + ({"care": "Care", "basics": "Basics", "superhuman": "SuperHuman", "abs": "Пресс", "woman-health": "Женское здоровье", "soft-power": "Soft Power", "stretch": "Растяжка", "pregnancy": "Для беременных", "mama": "Мама", "bed": "Не вставая с кровати", "body-contact": "Контакт с телом"}[row.courseChoice] || row.courseChoice) : '')}</span>`
          : '';

      return `
        <article class="story-card${row.hasQuestionnaire ? '' : ' is-missing'}">
          <div class="story-head">
            <div>
              <div class="story-title">${escapeHtml(row.displayName)}</div>
              <div class="story-meta">
                ${statusPill}
                ${pickPill}
                <span class="pill">${escapeHtml(row.telegramHandle || 'без telegram')}</span>
                <span class="pill">${escapeHtml(row.submittedAtLabel || '—')}</span>
              </div>
            </div>
            <div class="story-links">
              <a class="story-link" href="${row.questionnaireUrl}" target="_blank" rel="noopener noreferrer">Открыть анкету</a>
              <a class="story-link" href="${row.week1TrackerUrl}" target="_blank" rel="noopener noreferrer">Week 1 tracker</a>
              ${row.questionnaireIssueUrl ? `<a class="story-link" href="${row.questionnaireIssueUrl}" target="_blank" rel="noopener noreferrer">GitHub issue</a>` : ''}
            </div>
          </div>

          <div class="story-grid">
            <div class="story-main">
              <section class="block">
                <div class="block-label">Подробный рассказ</div>
                ${paragraph(story.intro)}
              </section>
              ${story.context ? `<section class="block"><div class="block-label">Контекст и мотивация</div>${paragraph(story.context)}</section>` : ''}
              ${story.rhythm ? `<section class="block"><div class="block-label">Текущий ритм и жизнь</div>${paragraph(story.rhythm)}</section>` : ''}
              ${story.healthSummary ? `<section class="block"><div class="block-label">Здоровье и ограничения</div>${paragraph(story.healthSummary)}</section>` : ''}
              ${story.foodSummary ? `<section class="block"><div class="block-label">Питание и привычки</div>${paragraph(story.foodSummary)}</section>` : ''}
              ${story.extra ? `<section class="block"><div class="block-label">Дополнительно</div>${paragraph(story.extra)}</section>` : ''}
              <section class="block">
                <div class="block-label">Исходные фрагменты</div>
                <div style="margin-top:12px; display:grid; gap:10px;">
                  ${detailSection('Vision / чего хочет к концу апреля', story.vision)}
                  ${detailSection('Personal context / текущий контекст', story.personalContext)}
                  ${detailSection('Purpose / как поймёт, что идёт правильно', story.purpose)}
                  ${detailSection('Lead note / исходная заявка', story.leadAbout)}
                </div>
              </section>
            </div>

            <aside class="story-side">
              <section class="block">
                <div class="block-label">Быстрые факты</div>
                <div class="facts" style="margin-top:14px;">
                  <div class="fact">
                    <div class="fact-label">Email</div>
                    <div class="fact-value">${escapeHtml(row.email || '—')}</div>
                  </div>
                  <div class="fact">
                    <div class="fact-label">Путь</div>
                    <div class="fact-value">${escapeHtml(row.selectedPath || '—')}</div>
                  </div>
                  <div class="fact">
                    <div class="fact-label">Выбранный курс</div>
                    <div class="fact-value">${escapeHtml(row.courseChoice ? ({"care": "Care", "basics": "Basics", "superhuman": "SuperHuman", "abs": "Пресс", "woman-health": "Женское здоровье", "soft-power": "Soft Power", "stretch": "Растяжка", "pregnancy": "Для беременных", "mama": "Мама", "bed": "Не вставая с кровати", "body-contact": "Контакт с телом"}[row.courseChoice] || row.courseChoice) : '—')}</div>
                  </div>
                  <div class="fact">
                    <div class="fact-label">Lead issue</div>
                    <div class="fact-value">${escapeHtml(row.leadIssueNumber ? '#' + row.leadIssueNumber : '—')}</div>
                  </div>
                  <div class="fact">
                    <div class="fact-label">Questionnaire issue</div>
                    <div class="fact-value">${escapeHtml(row.questionnaireIssueNumber ? '#' + row.questionnaireIssueNumber : '—')}</div>
                  </div>
                  ${row.matchedBy ? `<div class="fact"><div class="fact-label">Matched by</div><div class="fact-value">${escapeHtml(row.matchedBy)}</div></div>` : ''}
                </div>
              </section>

              <section class="block">
                <div class="block-label">Тело, питание, быт</div>
                <div style="margin-top:12px; display:grid; gap:10px;">
                  ${detailSection('Health restrictions', story.health)}
                  ${detailSection('Typical day', story.typicalDay)}
                  ${detailSection('Food habits', story.foodHabits)}
                  ${detailSection('Medications', story.medications)}
                  ${detailSection('Message for curator', story.curatorMessage)}
                  ${detailSection('Nutrition flags', story.nutritionFlags)}
                  ${detailSection('Pelvic floor flags', story.pelvicFlags)}
                </div>
              </section>
            </aside>
          </div>
        </article>
      `;
    }

    function getVisibleRows() {
      const query = (searchInput.value || '').trim().toLowerCase();
      return ALL_ROWS.filter((row) => {
        if (activeFilter === 'saved' && !row.hasQuestionnaire) return false;
        if (activeFilter === 'missing' && row.hasQuestionnaire) return false;
        if (!query) return true;
        const haystack = [
          row.displayName,
          row.telegramHandle,
          row.email,
          row.selectedPath,
          row.courseChoice,
          row.story?.intro,
          row.story?.context,
          row.story?.body,
          row.story?.vision,
          row.story?.personalContext,
          row.story?.leadAbout
        ].join(' ').toLowerCase();
        return haystack.includes(query);
      });
    }

    function syncStats() {
      statTotal.textContent = String(ALL_ROWS.length);
      statSaved.textContent = String(ALL_ROWS.filter((row) => row.hasQuestionnaire).length);
      statMissing.textContent = String(ALL_ROWS.filter((row) => !row.hasQuestionnaire).length);
      statPick.textContent = String(ALL_ROWS.filter((row) => row.hasQuestionnaire && !row.courseChoice && row.selectedPath === 'personal').length);
    }

    function render() {
      const rows = getVisibleRows();
      if (!rows.length) {
        storiesRoot.innerHTML = '<div class="empty">Под текущий фильтр ничего не найдено.</div>';
        return;
      }
      storiesRoot.innerHTML = rows.map(buildCard).join('');
    }

    filters.addEventListener('click', (event) => {
      const button = event.target.closest('[data-filter]');
      if (!button) return;
      activeFilter = button.dataset.filter || 'all';
      [...filters.querySelectorAll('[data-filter]')].forEach((item) => {
        item.classList.toggle('is-active', item.dataset.filter === activeFilter);
      });
      render();
    });

    searchInput.addEventListener('input', render);
    syncStats();
    render();
  </script>
</body>
</html>
